<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Herbalife Run 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:white}

/* HERO */
.hero{
height:100vh;

/* BACKGROUND DINAMIS */
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
var(--bg-image, url('poster.jpg')) center/cover no-repeat;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:zoom 20s infinite alternate;
}

/* fallback kalau gambar gagal */
.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.3);
z-index:-1;
}

@keyframes zoom{
from{background-size:100%;}
to{background-size:110%;}
}

h1{
font-size:42px;
font-weight:800;
background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tag{
margin-top:10px;
background:#ef4444;
padding:6px 14px;
border-radius:30px;
font-size:12px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

/* COUNTDOWN */
.countdown{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
justify-content:center;
}

.box{
background:#0f172a;
padding:12px;
border-radius:10px;
min-width:70px;
}

.box span{
font-size:20px;
font-weight:bold;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 25px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* PROGRESS */
.progress{
width:80%;
max-width:300px;
height:10px;
background:#1e293b;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ef4444,#f97316);
animation:load 6s forwards;
}

@keyframes load{
to{width:92%;}
}

.warn{
color:#f87171;
margin-top:5px;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
max-width:800px;
margin:auto;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.card h3{
color:#22c55e;
}

/* FLOAT WA */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

/* MOBILE FIX */
@media(max-width:500px){
h1{font-size:30px}
}
</style>
</head>

<body>

<!-- 🔥 GANTI GAMBAR DISINI SAJA -->
<div class="hero" style="--bg-image: url('poster.jpg');">

<h1>OPEN REGISTRATION</h1>
<p>HERBALIFE RUN 2026</p>

<div class="tag">KUOTA HAMPIR PENUH</div>

<div class="countdown">
<div class="box"><span id="d">0</span><br>Hari</div>
<div class="box"><span id="h">0</span><br>Jam</div>
<div class="box"><span id="m">0</span><br>Menit</div>
<div class="box"><span id="s">0</span><br>Detik</div>
</div>

<div class="progress"><div class="bar"></div></div>
<p class="warn">⚠️ 92% Slot Terisi</p>

<button class="btn" onclick="goDaftar()">Daftar Sekarang</button>
</div>

<div class="section">
<h2>Race Categories</h2>

<div class="cards">

<div class="card" onclick="goDaftar('24K')">
<h3>24K</h3>
<p>Rp.500.000</p>
</div>

<div class="card" onclick="goDaftar('10K')">
<h3>10K</h3>
<p>Rp.350.000</p>
</div>

<div class="card" onclick="goDaftar('5K')">
<h3>5K</h3>
<p>Rp.200.000</p>
</div>

<div class="card" onclick="goDaftar('FUN WALK')">
<h3>FUN WALK</h3>
<p>Rp.150.000</p>
</div>

<div class="card" onclick="goDaftar('KIDS RUN')">
<h3>KIDS RUN</h3>
<p>Rp.130.000</p>
</div>

</div>
</div>

<div class="wa" onclick="goDaftar()">💬</div>

<script>
// COUNTDOWN
const target = new Date("Sep 27, 2026 00:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const diff = target - now;

if(diff>0){
document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
}
},1000);

// REDIRECT
function goDaftar(kategori=""){
window.location.href = "https://jotri623.github.io/FORM-HERBALIFE-/?kategori=" + kategori;
}
</script>

</body>
</html>
